version: "3.8"

networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: "172.26.0.0/24"

services:
  mock-imds:
    build: ./mock-imds
    container_name: mock-imds-easy
    networks:
      lab_net:
        ipv4_address: 172.26.0.254
    restart: unless-stopped

  app:
    build: .
    container_name: lab-app-easy
    volumes:
      # KEY VULNERABILITY: Docker socket mounted inside the container
      # This allows creating new containers from within the app
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      # Map Azure IMDS address to our mock container
      - "169.254.169.254:172.26.0.254"
    networks:
      - lab_net
    ports:
      - "5000:5000"
    depends_on:
      - mock-imds
    environment:
      - FLAG=CTF{34sy_pr0mpt_1nj3ct10n_n0_f1lt3r}
      - DB_PASSWORD=S3cur3P4ss!2026
      - INTERNAL_API_KEY=sk-internal-34sy-d0n0t-sh4re-xyz789abc012
      - TENANT_ID=deadbeef-dead-beef-dead-beefdeadbeef
      - CLIENT_ID=cafebabe-cafe-babe-cafe-babecafebabe
      - SUBSCRIPTION_ID=12345678-1234-1234-1234-123456789012
    restart: unless-stopped
